<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>SIPM Supervisiones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Archivo:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
  </head>
  <body class="entry-body">
    <main class="entry-wrap">
      <div class="entry-card">
        <p class="eyebrow">SIPM</p>
        <h1>SIPM Supervision</h1>
        <p class="text-muted mb-4">Preparando plataforma...</p>
        <div class="spinner-border text-light" role="status" aria-label="Cargando"></div>
      </div>
    </main>

    <script type="module">
      import { STORAGE_KEYS } from "./js/config.js";

      const raw = localStorage.getItem(STORAGE_KEYS.session);
      if (raw) {
        window.location.replace("dashboard.html");
      } else {
        window.location.replace("login.html");
      }
    </script>
  </body>
</html>
