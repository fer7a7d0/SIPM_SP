<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | SIPM Supervisiones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Archivo:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages/login.css" />
  </head>
  <body>
    <main class="container-fluid px-3 py-4 login-page">
      <section class="surface login-surface mx-auto">
        <p class="eyebrow mb-1">MVP Plataforma</p>
        <h1 class="title-xl">Supervision de Procesos</h1>
        <p class="text-muted mb-4">Ingresa con tu ID de supervisor para iniciar el recorrido.</p>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="userId" class="form-label">Usuario (ID)</label>
            <input id="userId" name="userId" type="text" class="form-control form-control-lg" placeholder="Ej: SUP-001" autocomplete="username" required />
          </div>

          <button id="loginButton" type="submit" class="btn btn-brand btn-lg w-100">Iniciar sesion</button>
        </form>

        <div id="loginMessage" class="status-slot mt-3" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="js/pages/loginPage.js"></script>
  </body>
</html>
