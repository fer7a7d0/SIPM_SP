<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Historial | SIPM Supervisiones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/pages/historial.css" />
  </head>
  <body>
    <main class="container-fluid px-3 py-3">
      <section class="surface dashboard-surface mx-auto p-3">
        <header class="d-flex justify-content-between align-items-start gap-3 mb-3">
          <div>
            <p class="eyebrow mb-1">Historial</p>
            <h1 class="title-lg">Supervisiones registradas</h1>
          </div>
          <a class="btn btn-outline-dark btn-sm" href="dashboard.html">Volver</a>
        </header>

        <div class="filters-grid mb-3">
          <div>
            <label for="filterDate" class="form-label">Fecha</label>
            <input id="filterDate" type="date" class="form-control" />
          </div>
          <div>
            <label for="filterSupervisor" class="form-label">Supervisor</label>
            <select id="filterSupervisor" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>
          <div>
            <label for="filterArea" class="form-label">Area</label>
            <select id="filterArea" class="form-select">
              <option value="">Todas</option>
            </select>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button id="searchBtn" class="btn btn-brand btn-lg">Buscar</button>
        </div>

        <div id="historyList" class="history-list"></div>

        <div id="historyMessage" class="status-slot mt-3" aria-live="polite"></div>
      </section>
    </main>

    <div id="detailPanel" class="detail-modal" hidden>
      <div id="detailBackdrop" class="detail-modal-backdrop"></div>
      <section class="detail-modal-panel" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
        <header class="d-flex justify-content-between align-items-start gap-3 mb-3">
          <h2 id="detailModalTitle" class="title-md mb-0">Detalle de supervision</h2>
          <button id="closeDetailBtn" type="button" class="btn btn-outline-dark btn-sm">Cerrar</button>
        </header>
        <div id="detailBody"></div>
      </section>
    </div>

    <script type="module" src="js/pages/historialPage.js"></script>
  </body>
</html>
