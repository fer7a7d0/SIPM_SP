<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | SIPM Supervisiones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Archivo:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages/dashboard.css" />
  </head>
  <body>
    <main class="container-fluid px-3 py-3 dashboard-page">
      <section class="surface dashboard-surface mx-auto">
        <header class="d-flex justify-content-between align-items-start gap-3 mb-3">
          <div>
            <p class="eyebrow mb-1">Dashboard</p>
            <h1 class="title-lg">Informacion actual</h1>
          </div>
          <a class="btn btn-outline-dark btn-sm" href="dashboard.html">Volver</a>
        </header>

        <div class="card card-soft mb-3">
          <div class="card-body">
            <p class="meta mb-2">Supervisor</p>
            <h2 id="supervisorName" class="title-md mb-2">-</h2>
            <p id="currentDate" class="mb-1">Fecha: -</p>
            <p id="todayCount" class="mb-0">Supervisiones hoy: -</p>
          </div>
        </div>

        <div id="desboarMessage" class="status-slot mt-3" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="js/pages/desboarPage.js"></script>
  </body>
</html>
