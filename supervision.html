<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervision | SIPM Supervisiones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/pages/supervision.css" />
  </head>
  <body>
    <main class="container-fluid px-3 py-3">
      <section class="surface dashboard-surface mx-auto p-3">
        <p class="eyebrow mb-1">Supervision</p>
        <h1 class="title-lg mb-3">Checklist de supervision</h1>

        <div class="card card-soft mb-3">
          <div class="card-body">
            <p class="meta mb-1">Area</p>
            <h2 id="areaName" class="title-md mb-2">-</h2>
            <p id="startTime" class="mb-1">Hora inicio: -</p>
            <p id="gpsText" class="mb-0">GPS: -</p>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center checklist-meta mb-2">
          <p class="mb-0"><strong id="answeredCount">0</strong>/<span id="totalCount">0</span> respondidas</p>
          <small id="photoCount">Fotos: 0</small>
        </div>

        <div id="checklistContainer" class="checklist-stack"></div>

        <div class="d-grid gap-2">
          <button id="continueChecklistBtn" class="btn btn-brand btn-lg">Continuar a resumen</button>
          <a class="btn btn-dark btn-lg" href="dashboard.html">Volver al dashboard</a>
        </div>

        <div id="supervisionMessage" class="status-slot mt-3" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="js/pages/supervisionPage.js"></script>
  </body>
</html>
